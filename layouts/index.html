<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>
    <title>{{ .Site.Title }}</title>
    {{ partial "head.html" . }}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .main {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .custom-home {
            text-align: left;
            padding: 0 20px;
            max-width: 100%;
            margin-left: 5%;
            margin-right: 5%;
            width: 100%;
            /* text-transform: lowercase; */
        }
        .custom-home-content h1 {
            font-size: 3.25rem;
            margin-bottom: 2.5rem;
            font-weight: normal;
        }
        .custom-home-content p {
            font-size: 1.56rem;
            line-height: 1.8;
            margin-bottom: 2rem;
            color: var(--text-color);
        }
        .custom-home-links {
            margin-top: 5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .custom-home-links a {
            font-size: 1.56rem;
            text-decoration: none;
            color: #888;
            transition: color 0.2s;
        }
        .custom-home-links a:hover {
            color: var(--text-color);
            /* text-decoration: underline; */
            font-weight: bold;
        }
        .rotating-title {
            position: relative;
            height: 3.9rem;
            margin-bottom: 2.5rem;
            font-size: 3.25rem;
            font-weight: normal;
        }
        {{ $titles := .Site.Params.rotating_titles | default (slice "eh, yo.") }}
        {{ $duration := .Site.Params.rotating_titles_duration | default 3 }}
        {{ $count := len $titles }}
        {{ $totalDuration := mul $count $duration }}
        .rotating-title span {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            filter: blur(8px);
            animation: cycle-titles {{ $totalDuration }}s infinite ease-in-out;
        }
        {{ range $index, $title := $titles }}
        .rotating-title span:nth-child({{ add $index 1 }}) { animation-delay: {{ mul $index $duration }}s; }
        {{ end }}

        @keyframes cycle-titles {
            0% { opacity: 0; filter: blur(8px); }
            {{ printf "%.2f%%" (div 50.0 $count) }} { opacity: 1; filter: blur(0px); }
            {{ printf "%.2f%%" (div 100.0 $count) }} { opacity: 1; filter: blur(0px); }
            {{ printf "%.2f%%" (div 150.0 $count) }} { opacity: 0; filter: blur(8px); }
            100% { opacity: 0; filter: blur(8px); }
        }

        @media only screen and (min-width: 992px) {
            .main {
                width: 100%;
            }
        }

        @media only screen and (max-width: 768px) {
            .custom-home-content h1 {
                font-size: 2rem;
                margin-bottom: 1.5rem;
            }
            .custom-home-content p {
                font-size: 1.1rem;
                margin-bottom: 1.5rem;
            }
            .custom-home-links {
                margin-top: 2rem;
                gap: 1.2rem;
            }
            .custom-home-links a {
                font-size: 1.1rem;
            }
            .rotating-title {
                height: 2.4rem;
                margin-bottom: 1.5rem;
                font-size: 2rem;
            }
        }
        .texture::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('/paper-texture.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            mix-blend-mode: multiply; /* use 'screen' if the grain is light */
            opacity: 0.8;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body class="texture">
    <div class="flexWrapper">
        <div class="content">
            <main class="main">
                <div class="custom-home">
                    <div class="custom-home-content">
                        <h1 class="rotating-title">
                            {{ range $titles }}
                            <span>{{ . }}</span>
                            {{ end }}
                        </h1>
                        <script>
                            (function() {
                                const titleContainer = document.querySelector('.rotating-title');
                                if (titleContainer) {
                                    const spans = Array.from(titleContainer.querySelectorAll('span'));
                                    for (let i = spans.length - 1; i > 0; i--) {
                                        const j = Math.floor(Math.random() * (i + 1));
                                        [spans[i], spans[j]] = [spans[j], spans[i]];
                                    }
                                    spans.forEach(span => titleContainer.appendChild(span));
                                }
                            })();
                        </script>
                        {{ .Content }}
                    </div>
                    <div class="custom-home-links">
                        {{ range .Site.Menus.header }}
                            <a href="{{ .URL | absLangURL }}">{{ .Name }}</a>
                        {{ end }}
                        {{ range sort .Site.Params.social "key" }}
                            <a href="{{ .url | safeURL }}">
                                {{ if .icon }}<i class="{{ .icon }}" style="margin-right: 8px;"></i>{{ end }}{{ .name }}
                            </a>
                        {{ end }}
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
